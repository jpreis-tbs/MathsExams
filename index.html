<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams Hall</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' height='24' viewBox='0 0 24 24' width='24'%3E%3Cpath fill='%23ffffff' d='M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .landing {
            text-align: center;
            max-width: 560px;
            width: 100%;
        }

        .landing h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .landing .tagline {
            font-size: 1.2rem;
            color: #777;
            margin-bottom: 48px;
        }

        .landing-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 360px;
            margin: 0 auto;
        }

        .landing-btn {
            display: block;
            text-decoration: none;
            background: #000;
            color: #fff;
            border-radius: 8px;
            padding: 20px 28px;
            font-size: 1.25rem;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
        }

        .landing-btn:hover {
            opacity: 0.85;
        }

        .landing-btn:active {
            transform: translateY(1px);
        }

        .landing-btn.secondary {
            background: #fff;
            color: #000;
            border: 2px solid #000;
        }

        /* GitHub link */
        .github-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #bbb;
            line-height: 0;
            z-index: 150;
            transition: color 0.2s;
        }

        .github-link:hover {
            color: #000;
        }

        .github-link svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        /* Responsive: tablets */
        @media (max-width: 768px) {
            .landing h1 {
                font-size: 3.2rem;
            }
        }

        /* Responsive: phones */
        @media (max-width: 480px) {
            body {
                padding: 24px;
            }

            .landing h1 {
                font-size: 2.6rem;
            }

            .landing .tagline {
                font-size: 1.05rem;
                margin-bottom: 36px;
            }

            .landing-btn {
                font-size: 1.1rem;
                padding: 18px 22px;
            }

            .github-link svg {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>

    <div class="landing">
        <h1>Exams Hall</h1>
        <p class="tagline">Exam timing and invigilation tools</p>
        <div class="landing-buttons">
            <a class="landing-btn" href="timer.html">Exam Timer</a>
            <a class="landing-btn secondary" href="incident-log.html">Incident Log Sheet</a>
        </div>
    </div>

    <!-- GitHub link -->
    <a class="github-link" href="https://github.com/oscarneiva" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile" title="GitHub">
        <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
    </a>

</body>
</html>
