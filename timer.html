<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths exams</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' height='24' viewBox='0 0 24 24' width='24'%3E%3Cpath fill='%23ffffff' d='M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
        }

        /* Setup overlay */
        #setup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #setup-overlay.hidden {
            display: none;
        }

        .setup-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 40px;
            width: 440px;
            max-width: 90vw;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .setup-card h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1.05rem;
            color: #000;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group select:focus,
        .form-group input:focus {
            border-color: #555;
        }

        .duration-row {
            display: flex;
            gap: 10px;
        }

        .duration-row input {
            flex: 1;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            width: 100%;
            margin-top: 8px;
        }

        .btn-link {
            background: none;
            color: #555;
            font-size: 0.95rem;
            text-decoration: underline;
            padding: 8px 0;
            width: 100%;
            text-align: center;
            cursor: pointer;
            border: none;
            margin-top: 4px;
        }

        .btn-link:hover {
            color: #000;
        }

        .setup-cancel {
            background: none;
            color: #999;
            font-size: 0.9rem;
            text-decoration: underline;
            padding: 8px 0;
            width: 100%;
            text-align: center;
            cursor: pointer;
            border: none;
            margin-top: 2px;
            display: none;
        }

        .setup-cancel:hover {
            color: #000;
        }

        /* Timer view */
        #timer-view {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 30px 40px 80px;
            flex-direction: column;
            align-items: center;
        }

        #timer-view.active {
            display: flex;
        }

        .timer-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
        }

        .current-time-label {
            font-size: 1.1rem;
            color: #777;
            margin-bottom: 4px;
        }

        .current-time {
            font-size: 4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }
#next-announcement {
            font-size: 2rem; /* 50% of the 4rem main clock */
            color: #888;
            font-style: italic;
            margin-top: 8px;
        }

        /* Card grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            width: 100%;
        }

        .exam-card {
            border: 4px solid;
            border-radius: 14px;
            padding: 28px 32px;
            position: relative;
            cursor: grab;
            user-select: none;
            transition: box-shadow 0.2s, opacity 0.2s;
        }

        .exam-card.dragging {
            opacity: 0.4;
            box-shadow: none;
        }

        .exam-card.drag-over {
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.2);
        }

        .exam-card:active {
            cursor: grabbing;
        }

        .exam-card.ib {
            border-color: #1a56db;
        }

        .exam-card.igcse {
            border-color: #dc2626;
        }

        .card-remove {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #bbb;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }

        .card-remove:hover {
            color: #666;
        }

        .exam-name {
            font-size: 3.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2px;
        }

        .exam-board-label {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .exam-card.ib .exam-board-label {
            color: #1a56db;
        }

        .exam-card.igcse .exam-board-label {
            color: #dc2626;
        }

        .exam-duration-label {
            font-size: 1.1rem;
            color: #777;
            text-align: center;
            margin-bottom: 10px;
        }

        .time-rows {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 18px;
            border-radius: 6px;
            transition: background-color 0.3s, color 0.3s;
        }

        .time-row .label {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .time-row .value {
            font-size: 1.2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .time-row.highlighted-ib {
            background: #1a56db;
            color: #fff;
        }

        .time-row.highlighted-igcse {
            background: #dc2626;
            color: #fff;
        }

        .start-edit-row.highlighted-ib {
            background: #1a56db;
            color: #fff;
        }

        .start-edit-row.highlighted-igcse {
            background: #dc2626;
            color: #fff;
        }

        .countdown-section {
            margin-top: 10px;
            text-align: center;
        }

        .countdown-status {
            font-size: 1.1rem;
            font-weight: 500;
            color: #777;
            margin-bottom: 4px;
        }

        .countdown-time {
            display: inline-block;
            font-size: 6rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            padding: 4px 18px;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
        }

        .exam-card.ib .countdown-time {
            color: #1a56db;
        }

        .exam-card.igcse .countdown-time {
            color: #dc2626;
        }

        .exam-card.ib .countdown-time.highlighted-ib {
            background: #1a56db;
            color: #fff;
        }

        .exam-card.igcse .countdown-time.highlighted-igcse {
            background: #dc2626;
            color: #fff;
        }

        /* Editable start time */
        .start-edit-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 18px;
            border-radius: 6px;
            transition: background-color 0.3s, color 0.3s;
        }

        .start-edit-row .label {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .start-edit-input {
            font-size: 1.2rem;
            font-weight: 700;
            font-family: inherit;
            font-variant-numeric: tabular-nums;
            border: 2px solid #ccc;
            border-radius: 6px;
            padding: 2px 10px;
            background: #fff;
            color: #000;
            outline: none;
            width: auto;
            text-align: center;
        }

        .start-edit-input:focus {
            border-color: #888;
        }

        .start-edit-input::-webkit-calendar-picker-indicator,
        .start-edit-input::-webkit-inner-spin-button,
        .start-edit-input::-webkit-clear-button {
            -webkit-appearance: none;
            appearance: none;
            display: none !important;
            width: 0;
            height: 0;
            margin: 0;
            padding: 0;
        }

        /* Add timer button (inside grid) */
        .add-card {
            border: 3px dashed #ddd;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .add-card:hover {
            border-color: #aaa;
            background: #fafafa;
        }

        .add-card-content {
            text-align: center;
            color: #aaa;
        }

        .add-card-content .plus {
            font-size: 3rem;
            font-weight: 300;
            line-height: 1;
        }

        .add-card-content .add-label {
            font-size: 1.1rem;
            margin-top: 6px;
        }

        /* Toast popup */
        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 32px 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            z-index: 200;
            text-align: center;
            max-width: 400px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        #toast.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        #toast-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 199;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #toast-backdrop.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #toast p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #333;
            margin-bottom: 20px;
        }

        #toast button {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 28px;
            font-size: 1rem;
            cursor: pointer;
        }

        #toast button:hover {
            opacity: 0.85;
        }

        /* Bottom controls */
        .bottom-controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-bottom {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 18px;
            font-size: 0.95rem;
            color: #555;
            cursor: pointer;
        }

        .btn-bottom:hover {
            background: #eee;
            color: #000;
        }

        /* Hidden file input */
        #file-input {
            display: none;
        }

        /* GitHub link */
        .github-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #bbb;
            line-height: 0;
            z-index: 150;
            transition: color 0.2s;
        }

        .github-link:hover {
            color: #000;
        }

        .github-link svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }
/* --- PHASE 3: VISUAL STYLING ADDITIONS --- */

    /* 1. Active Warning Inversion */
    .exam-card.ib .time-row.active-warning-invert,
    .exam-card.ib .start-edit-row.active-warning-invert,
    .exam-card.ib .time-row.active-extra-warning {
        background-color: #1a56db !important;
        color: #fff !important;
        border-radius: 6px;
    }
    .exam-card.igcse .time-row.active-warning-invert,
    .exam-card.igcse .start-edit-row.active-warning-invert,
    .exam-card.igcse .time-row.active-extra-warning {
        background-color: #dc2626 !important;
        color: #fff !important;
        border-radius: 6px;
    }
    
    /* Ensure subordinate extra time remains legible during inversion */
    .active-warning-invert .extra-time-val,
    .active-extra-warning .extra-time-val {
        color: #f9f9f9 !important;
    }

    /* 2. Dual Rectangles for Extra Time Warnings (Inverted against the active row) */
    .exam-card.ib .time-row.active-extra-warning .main-label,
    .exam-card.ib .time-row.active-extra-warning .extra-label {
        background-color: #fff;
        color: #1a56db;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: -6px;
    }
    .exam-card.igcse .time-row.active-extra-warning .main-label,
    .exam-card.igcse .time-row.active-extra-warning .extra-label {
        background-color: #fff;
        color: #dc2626;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: -6px;
    }

    /* 5. Permanent "Regular End" Marker */
    .exam-card.ib .regular-end-marker .main-label {
        background-color: #1a56db;
        color: #fff;
        padding: 2px 8px;
        border-radius: 4px;
        margin-left: -8px;
    }
    .exam-card.igcse .regular-end-marker .main-label {
        background-color: #dc2626;
        color: #fff;
        padding: 2px 8px;
        border-radius: 4px;
        margin-left: -8px;
    }

    /* 6. Diagonal Finished Banner Board Colors */
    .exam-card.ib .exam-finished-overlay {
        background-color: #1a56db;
    }
    .exam-card.igcse .exam-finished-overlay {
        background-color: #dc2626;
    }
.exam-card.igcse .exam-finished-overlay {
        background-color: #dc2626;
    }

    /* Maths Board Colors */
    .exam-card.maths {
        --exam-color: #FFDA03;
    }
    
    .exam-card.maths .time-row.active-warning-invert,
    .exam-card.maths .start-edit-row.active-warning-invert,
    .exam-card.maths .time-row.active-extra-warning {
        background-color: #FFDA03 !important;
        color: #000 !important;
        border-radius: 6px;
    }
    
    .exam-card.maths.active-warning-invert .extra-time-val,
    .exam-card.maths.active-extra-warning .extra-time-val {
        color: #333 !important;
    }

    .exam-card.maths .time-row.active-extra-warning .main-label,
    .exam-card.maths .time-row.active-extra-warning .extra-label {
        background-color: #000;
        color: #FFDA03;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: -6px;
    }

    .exam-card.maths .regular-end-marker .main-label {
        background-color: #FFDA03;
        color: #000;
        padding: 2px 8px;
        border-radius: 4px;
        margin-left: -8px;
    }

    .exam-card.maths .exam-finished-overlay {
        background-color: #FFDA03;
        color: #000 !important;
    }

        /* Responsive: small desktops / large tablets -> 3 columns */
        @media (max-width: 1100px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Responsive: tablets (iPad portrait) -> 2 columns */
        @media (max-width: 820px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .exam-name {
                font-size: 2.6rem;
            }

            .countdown-time {
                font-size: 5rem;
            }
        }

        /* Responsive: phones -> single column */
        @media (max-width: 560px) {
            #timer-view {
                padding: 24px 16px 96px;
            }

            .timer-header {
                margin-bottom: 24px;
            }

            .current-time {
                font-size: 3rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .exam-card {
                padding: 22px 22px;
            }

            .exam-name {
                font-size: 2.2rem;
            }

            .countdown-time {
                font-size: 4.4rem;
            }

            .setup-card {
                padding: 28px 24px;
            }
#extra-time-section > div {
                flex-direction: column;
                gap: 6px !important;
            }

            .github-link svg {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>
    <!-- Setup overlay -->
    <div id="setup-overlay">
        <div class="setup-card">
            <h1>Exam Timer</h1>
            <div class="form-group">
                <label for="exam-board">Exam Board</label>
                <select id="exam-board">
                    <option value="IB">IB</option>
                    <option value="IGCSE">IGCSE</option>
<optgroup label="Maths">
                    <option value="maths-kangaroo">Maths Kangaroo (1h40m)</option>
                    <option value="maths-obmep">Maths OBMEP (2h30m)</option>
                    <option value="maths-jacob-palis">Maths Jacob Palis Jr (2h30m)</option>
                </optgroup>

                    <option value="Custom">Custom</option> 
                </select>
            </div>
            <div class="form-group">
                <label for="exam-name">Exam Name</label>
                <input type="text" id="exam-name" placeholder="e.g. English B Paper 1 HL">
            </div>
            <div class="form-group">
                <label>Duration</label>
                <div class="duration-row">
                    <input type="number" id="duration-hours" min="0" max="5" placeholder="Hours" value="1">
                    <input type="number" id="duration-minutes" min="0" max="59" placeholder="Minutes" value="30">
                </div>
            </div>
            <div class="form-group">
                <label for="start-time">Start Time (24-hour, HH:MM)</label>
                <input type="text" id="start-time" inputmode="numeric" maxlength="5" placeholder="HH:MM" pattern="([01][0-9]|2[0-3]):[0-5][0-9]" lang="en-GB">
            </div>
<div id="custom-setup-section" style="display: none;">
                    <div class="form-group">
                        <label for="custom-board-name">Custom Name</label>
                        <input type="text" id="custom-board-name" placeholder="e.g. AQA, Edexcel">
                    </div>
                    <div class="form-group">
                        <label for="custom-warnings-count">Number of Warnings</label>
                        <input type="number" id="custom-warnings-count" min="0" max="5" value="1">
                    </div>
                    <div class="form-group">
                        <label for="custom-warning-times">Warning Times (mins before end, comma separated)</label>
                        <input type="text" id="custom-warning-times" placeholder="e.g. 5, 15">
                    </div>
                </div>

                <div id="extra-time-section" class="form-group">
                    <label>Extra Time Options</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                        <select id="extra-time-type" style="flex: 1;">
                            <option value="percentage">Percentage (%)</option>
                            <option value="absolute">Absolute (mins)</option>
                            <option value="none">None</option>
                        </select>
                        <input type="number" id="extra-time-value" min="0" placeholder="Value" value="25" style="flex: 1;">
                    </div>
                </div>
            <button class="btn btn-primary" id="btn-start">Add Timer</button>
            <button class="btn btn-primary" id="btn-load">Load Timer</button>
            <button class="setup-cancel" id="btn-cancel">Cancel</button>
            <input type="file" id="file-input" accept=".json">
        </div>
    </div>

    <!-- Timer view -->
    <div id="timer-view">
        <div class="timer-header">
            <div class="current-time-label">Current Time</div>
            <div class="current-time" id="current-time">--:--:--</div>
<div id="next-announcement" style="display: none;"></div>
        </div>

        <div class="cards-grid" id="cards-grid">
            <!-- Exam cards and add-card injected by JS -->
        </div>

        <div class="bottom-controls">
            <button class="btn btn-primary" id="btn-download">Save Timer</button>
        </div>
    </div>

    <!-- GitHub link -->
    <a class="github-link" href="https://github.com/oscarneiva" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile" title="GitHub">
        <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
    </a>

    <!-- Toast popup -->
    <div id="toast-backdrop"></div>
    <div id="toast">
        <p>Click on <strong>Save Timer</strong> to download your session in case of a shutdown.</p>
        <button id="toast-dismiss">OK</button>
    </div>

    <script>
        // State
        const timers = []; // array of { id, board, name, durationMin, startMin, times, el }
        let tickInterval = null;
        let nextId = 0;
        const MAX_TIMERS = 16;

        // DOM refs
        const setupOverlay = document.getElementById('setup-overlay');
        const timerView = document.getElementById('timer-view');
        const cardsGrid = document.getElementById('cards-grid');
        const btnCancel = document.getElementById('btn-cancel');

// Central Data Presets for specific exams
const examPresets = {
    "maths-kangaroo": {
        durationMin: 100,      // 1 hour 40 minutes
        extraTimeSec: 0,       // 0 extra time

function computeTimes(board, startMin, durationMin, extraMin = 0, customWarnings = []) {
    const times = [];
    const endMin = startMin + durationMin;
    const isIB = board === 'IB';

    if (isIB) {
        times.push({ key: 'reading', label: 'READING', time: startMin - 5, extraTime: null });
    }

    times.push({ key: 'start', label: 'START', time: startMin, extraTime: null });

    if (isIB && durationMin > 30) {
        times.push({ key: '30min', label: '30 MIN', time: endMin - 30, extraTime: extraMin > 0 ? endMin + extraMin - 30 : null });
    }

    if (customWarnings && customWarnings.length > 0) {
        customWarnings.sort((a, b) => b - a).forEach(w => {
            if (durationMin > w) {
                times.push({ key: w + 'min', label: w + ' MIN', time: endMin - w, extraTime: extraMin > 0 ? endMin + extraMin - w : null });
            }
        });
    }

    if (durationMin > 5) {
        times.push({ key: '5min', label: '5 MIN', time: endMin - 5, extraTime: extraMin > 0 ? endMin + extraMin - 5 : null });
    }

    times.push({ key: 'end', label: 'END', endLabel: 'END Regular time', time: endMin, extraTime: extraMin > 0 ? endMin + extraMin : null });

    if (extraMin > 0) {
        times.push({ key: 'extratime', label: 'EXTRA TIME', time: endMin + extraMin, extraTime: null });
    }

    return times;
}

function generateEvents(data) {
    const events = [];
    const now = new Date();
    // Base epoch for today at 00:00:00
    const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0).getTime() / 1000;
    const startEpoch = startOfToday + (data.startMin * 60);
    const endEpoch = startEpoch + (data.durationMin * 60);
    const boardDisplay = data.board === 'Custom' ? (data.customBoardName || 'Custom') : data.board;

    // Standard Events
    events.push([startEpoch, boardDisplay, data.name, 'Exam Starts']);
    events.push([endEpoch, boardDisplay, data.name, 'Exam Ends']);

    // IB Specific Events
    if (data.board === 'IB') {
        events.push([startEpoch - (5 * 60), boardDisplay, data.name, 'Reading Time Starts']);
        if (data.durationMin > 30) events.push([endEpoch - (30 * 60), boardDisplay, data.name, '30 Min Warning']);
    }

    // Universal & Custom Warnings
    if (data.durationMin > 5) {
        events.push([endEpoch - (5 * 60), boardDisplay, data.name, '5 Min Warning']);
    }
    if (data.customWarnings && data.customWarnings.length > 0) {
        data.customWarnings.forEach(w => {
            if (data.durationMin > w) events.push([endEpoch - (w * 60), boardDisplay, data.name, `${w} Min Warning`]);
        });
    }

    // Extra Time Event
    if (data.extraTimeSec && data.extraTimeSec > 0) {
        const extraEndEpoch = endEpoch + data.extraTimeSec;
        events.push([endEpoch, boardDisplay, data.name, 'Extra Time Starts']);
        events.push([extraEndEpoch, boardDisplay, data.name, 'Extra Time Ends']);
        
        // Add extra time warnings
        if (data.board === 'IB' && data.durationMin > 30) {
            events.push([extraEndEpoch - (30 * 60), boardDisplay, data.name, 'Extra Time 30 Min Warning']);
        }
        if (data.durationMin > 5) {

        }
        if (data.customWarnings && data.customWarnings.length > 0) {
            data.customWarnings.forEach(w => {
                if (data.durationMin > w) events.push([extraEndEpoch - (w * 60), boardDisplay, data.name, `Extra Time ${w} Min Warning`]);
            });
        }
    }

    // Sort chronologically
    return events.sort((a, b) => a[0] - b[0]);

            reader.readAsText(file);
            e.target.value = '';
        });

        // Download button
        document.getElementById('btn-download').addEventListener('click', () => {
            if (timers.length === 0) return;
            const saveData = timers.map(t => ({
        board: t.board,
        name: t.name,
        durationMin: t.durationMin,
        startMin: t.startMin,
        customBoardName: t.customBoardName || null,
        customWarnings: t.customWarnings || [],
        extraTimeSec: t.extraTimeSec || 0
    }));
            const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'timer.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        // --- Drag and drop reordering ---
        let draggedCard = null;

        cardsGrid.addEventListener('dragstart', (e) => {
            const card = e.target.closest('.exam-card');
            if (!card) { e.preventDefault(); return; }
            draggedCard = card;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        cardsGrid.addEventListener('dragend', (e) => {
            if (draggedCard) {
                draggedCard.classList.remove('dragging');
                draggedCard = null;
            }
            cardsGrid.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        });

        cardsGrid.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.exam-card');
            if (!target || target === draggedCard) return;
            cardsGrid.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            target.classList.add('drag-over');
        });

        cardsGrid.addEventListener('dragleave', (e) => {
            const target = e.target.closest('.exam-card');
            if (target) target.classList.remove('drag-over');
        });

        cardsGrid.addEventListener('drop', (e) => {
            e.preventDefault();
            const target = e.target.closest('.exam-card');
            if (!target || !draggedCard || target === draggedCard) return;
            target.classList.remove('drag-over');

            // Swap DOM positions
            const allCards = [...cardsGrid.querySelectorAll('.exam-card')];
            const dragIdx = allCards.indexOf(draggedCard);
            const dropIdx = allCards.indexOf(target);

            if (dragIdx < dropIdx) {
                cardsGrid.insertBefore(draggedCard, target.nextSibling);
            } else {
                cardsGrid.insertBefore(draggedCard, target);
            }

            // Sync timers array order to match DOM
            const newOrder = [...cardsGrid.querySelectorAll('.exam-card')].map(
                el => timers.find(t => t.id === Number(el.dataset.timerId))
            ).filter(Boolean);
            timers.length = 0;
            timers.push(...newOrder);
        });

        // Toast dismiss
        document.getElementById('toast-dismiss').addEventListener('click', hideToast);
        document.getElementById('toast-backdrop').addEventListener('click', hideToast);

        // Initial state: show setup
        showSetup();
    </script>
</body>
</html>
